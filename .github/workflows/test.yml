name: Test

# Type-check the source, build the site, then run the link checker
# against the build output. Catches:
# - Astro build failures (Zod schema mismatches, missing image imports,
#   broken Markdown frontmatter)
# - TypeScript regressions in src/ and tools/ (`astro check`)
# - WP-era slugs that survived the migration and would 404 in dev /
#   trigger a redirect hop in prod

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Persist Astro's Sharp image cache (the `assets/` folder under the
      # default cacheDir, node_modules/.astro) between runs so the build
      # copies the ~2,900 already-optimised variants instead of
      # reprocessing them from scratch. A cold cache adds 1-3 min of Sharp
      # work. Must come after `npm ci`, which wipes node_modules. Keyed on
      # the source images + image config so it invalidates only when an
      # image or a Sharp setting changes; restore-keys lets every other
      # build warm-start and process just the new/changed files.
      - uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-cache-${{ runner.os }}-${{ hashFiles('src/assets/img/**', 'astro.config.mjs') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-

      - run: npm run check

      - run: npm test
