name: Test

# Type-check the source, build the site, then run the link checker
# against the build output. Catches:
# - Astro build failures (Zod schema mismatches, missing image imports,
#   broken Markdown frontmatter)
# - TypeScript regressions in src/ and tools/ (`astro check`)
# - WP-era slugs that survived the migration and would 404 in dev /
#   trigger a redirect hop in prod

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Persist Astro's Sharp image cache (the `assets/` folder under the
      # default cacheDir, node_modules/.astro) between runs so the build
      # copies the already-optimised variants instead of re-encoding them
      # through Sharp from scratch. A cold cache adds 1-3 min of work.
      # Must come after `npm ci`, which wipes node_modules.
      #
      # The key busts the whole cache whenever the toolchain that emits
      # the bytes changes: a package-lock.json bump (Astro/Sharp version)
      # or any astro.config.mjs edit (global Sharp settings). Astro keys
      # its own cache on the source image + per-image transform only, so
      # it would otherwise reuse outputs encoded by the old toolchain.
      # Within a fixed toolchain the image hash moves the exact key as
      # images change, and restore-keys (scoped to the same toolchain)
      # warm-starts the build so Sharp only touches new/changed files.
      - uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-cache-${{ runner.os }}-${{ hashFiles('package-lock.json', 'astro.config.mjs') }}-${{ hashFiles('src/assets/img/**') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-${{ hashFiles('package-lock.json', 'astro.config.mjs') }}-

      - run: npm run check

      - run: npm test
